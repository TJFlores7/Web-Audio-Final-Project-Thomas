    <!--Starting Screen for the main app-->

    <div id="start-screen">
      <div class="title-3d">
        <h1 class="main-title">
          <span class="fruit-text">FRUIT</span>
          <span class="basket-text">BASKET</span>

      </div>

      <h2 class="subtitle">
        <span>T</span><span>a</span><span>s</span><span>t</span><span>e</span>

    <div id="app">

      <div id="interaction-zone">

        <div class="zone bl">Sour</div>
        <div class="zone br">Smoothie</div>
        <div class="zone center">Clean</div>
      </div>

      <!--The main fruits-->
      <div id="fruit-dock">

        </div>
        <div class="fruit-container">

        </div>
        <div class="fruit-container">
          <img src="imgs/Strawberry_icon.png" class="fruit" id="strawberry" />

        </div>
        <div class="fruit-container">
          <img src="imgs/Guava_icon.png" class="fruit" id="guava" />
          <div class="volume-bar"></div>
        </div>
        <div class="fruit-container">
          <img src="imgs/Watermelon_icon.png" class="fruit" id="watermelon" />

        </div>
        <div class="fruit-container">
          <img src="imgs/Cantaloupe_icon.png" class="fruit" id="cantaloupe" />
          <div class="volume-bar"></div>
        </div>
      </div>
