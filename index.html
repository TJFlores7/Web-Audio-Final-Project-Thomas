<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Audio Final Project Spring 2026</title>
  </head>
  <h1>Fruit Basket's Taste Test</h1>
  <h2>Thomas J. Flores</h2>
  <script type="module" src="js/main.js"></script>
  <body>
    <button id="pineappleBtn">Pineapple</button>
    <button id="bananaBtn">Banana</button>
    <button id="figBtn">Fig</button>
    <button id="pomegranateBtn">Pomegranate</button>
    <button id="strawberryBtn">Strawberry</button>
    <button id="guavaBtn">Guava</button>
    <button id="watermelonBtn">Watermelon</button>
    <button id="cantaloupeBtn">Cantaloupe</button>
    <h3>Main FX Bus sliders</h3>
    <h4>Echo Delay</h4>

    <div class="container">
      <label for="myRange">Delay Time</label>
      <input type="range" min="0" max="1" step="0.01" id="delaySlider" />
    </div>
    <div class="container">
      <label for="myRange">Wet Gain</label>
      <input type="range" min="0" max="1" step="0.01" id="wetSlider" />
    </div>
    <h5>Flanger</h5>
    <div class="container">
      <label for="myRange">Delay Time</label>
      <input
        type="range"
        min="0.0005"
        max="0.015"
        step="0.0005"
        id="delaySlider2"
      />
    </div>
    <div class="container">
      <label for="myRange">LFO</label>
      <input type="range" min="0.01" max="10" step="0.01" id="lfoSlider" />
    </div>
    <div class="container">
      <label for="myRange">LFO Depth</label>
      <input type="range" min="0.0001" max="0.005" step="0.0001" id="lfoGainSlider"/>
    </div>
    <div class="container">
      <label for="myRange">Wet Gain</label>
      <input type="range" min="0" max="1" step="0.01" id="wetSlider2"/>
  </body>
</html>
